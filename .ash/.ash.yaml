# yaml-language-server: $schema=../automated_security_helper/schemas/AshConfig.json
project_name: automated-security-helper
fail_on_findings: true
ash_plugin_modules: []
# ash_plugin_modules:
#   - automated_security_helper.plugin_modules.ash_aws_plugins
#   - automated_security_helper.plugin_modules.ash_trivy_plugins
external_reports_to_include: []
global_settings:
  severity_threshold: MEDIUM
  suppressions:
    # === detect-secrets: broad patterns by path (no inline nosec support) ===
    - rule_id: "SECRET-*"
      path: "tests/**"
      reason: "Test fixtures contain intentional secret patterns for validation"
    - rule_id: "SECRET-*"
      path: "scripts/**"
      reason: "Build scripts contain seeded test data generators"
    # === detect-secrets: specific source files ===
    - rule_id: SECRET-SECRET-KEYWORD
      path: automated_security_helper/utils/secret_masking.py
      reason: "Module processes secret-related strings — keyword matches are inherent"
    - rule_id: SECRET-SECRET-KEYWORD
      path: "docs/**"
      reason: "Documentation examples showing detection patterns"
    - rule_id: SECRET-BASE64-HIGH-ENTROPY-STRING
      path: pyproject.toml
      reason: "Project configuration — base64 strings are dependency hashes"
    # === semgrep/opengrep Python compatibility (ASH requires 3.10+) ===
    - rule_id: "python.lang.compatibility.*"
      path: "automated_security_helper/**/*.py"
      reason: "ASH requires Python 3.10+ (pyproject.toml) — older-version warnings not applicable"
    # === semgrep/opengrep Python security audit ===
    - rule_id: "python.lang.security.audit.non-literal-import.non-literal-import"
      path: "automated_security_helper/**/*.py"
      reason: "Plugin loading uses hardcoded module paths from registry, not user input"
    - rule_id: "python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected"
      path: "automated_security_helper/**/*.py"
      reason: "URLs are constructed from trusted config values, not user input"
    # === Shell script security (IFS in legacy utils scripts) ===
    - rule_id: "bash.lang.security.ifs-tampering.ifs-tampering"
      path: "utils/**/*.sh"
      reason: "Legacy ASHv2 scripts use IFS for field splitting — not user-facing"
    # === Checkov Dockerfile findings ===
    - rule_id: "CKV_DOCKER_*"
      path: "Dockerfile"
      reason: "Intentional Dockerfile patterns for ASH container build"
    - rule_id: "CKV_DOCKER_*"
      path: "automated_security_helper/assets/Dockerfile"
      reason: "Generated Dockerfile for pip-installed ASH container mode"
    # === GitHub Actions rules (YAML — no inline suppression) ===
    - path: ".github/**/*.yml"
      rule_id: "yaml.github-actions.security.*"
      reason: "ASH workflow interpolations use inputs.*/matrix.* (author-defined), not attacker-controlled github.event.* context"
  ignore_paths:
    - path: "**/.venv/**"
      reason: Virtual environment, not committed, only 3p content
    - path: "tests/test_data/**"
      reason: This is test data that is used during unit testing only and is not part of the core application.
    - path: "automated_security_helper/assets/ASH_COMMIT*"
      reason: This file is generated by the build process and does not contain any secrets or sensitive information.
    - path: "tests/pytest-temp/**"
      reason: This is temporary data that is generated during unit testing only and is not part of the core application.
    - path: "**/automated_security_helper/schemas/AshAggregatedResults.json"
      reason: This file is generated by a corresponding Pydantic model and does not contain any secrets or sensitive information. Findings on this file are false positives and should be addressed on the related Pydantic models, not on this JSON file.
    - path: "**/automated_security_helper/schemas/AshConfig.json"
      reason: This file is generated by a corresponding Pydantic model and does not contain any secrets or sensitive information. Findings on this file are false positives and should be addressed on the related Pydantic models, not on this JSON file.
reporters:
  security-hub:
    enabled: false
  # cloudwatch-logs:
  #   enabled: false
  #   options:
  #     aws_region: !ENV ${AWS_REGION:None}
  #     log_group_name: !ENV ${ASH_CLOUDWATCH_LOG_GROUP:None}
  # s3:
  #   enabled: false
  #   options:
  #     aws_region: !ENV ${AWS_REGION:None}
  #     bucket_name: !ENV ${ASH_S3_BUCKET_NAME:None}
  #     bucket_prefix: !ENV ${ASH_S3_BUCKET_PREFIX:None}
  csv:
    enabled: true
  cyclonedx:
    enabled: true
  flat-json:
    enabled: true
  html:
    enabled: true
  junitxml:
    enabled: true
  markdown:
    enabled: true
    options:
      include_detailed_findings: true
      include_findings_table: false
      include_summary: true
      max_detailed_findings: 20
      top_hotspots_limit: 10
      use_collapsible_details: true
  ocsf:
    enabled: true
  sarif:
    enabled: true
  text:
    enabled: true
  spdx:
    enabled: false
  yaml:
    enabled: false
  gitlab-sast:
    enabled: true
scanners:
  bandit:
    enabled: true
    options:
      confidence_level: all
      ignore_nosec: false
      config_file: .ash/bandit.yaml
  cdk-nag:
    enabled: true
    options:
      nag_packs:
        AwsSolutionsChecks: true
        HIPAASecurityChecks: true
        NIST80053R4Checks: true
        NIST80053R5Checks: true
        PCIDSS321Checks: true
  cfn-nag:
    enabled: true
  checkov:
    enabled: true
    options:
      frameworks:
        - all
      additional_formats: []
      skip_path: []
      config_file: .ash/.checkov.yaml
      severity_threshold: LOW
  detect-secrets:
    enabled: true
  npm-audit:
    enabled: true
  grype:
    enabled: true
    options:
      config_file: .ash/.grype.yaml
  opengrep:
    enabled: true
  semgrep:
    enabled: true
  syft:
    enabled: true
converters:
  archive:
    enabled: true
  jupyter:
    enabled: true
