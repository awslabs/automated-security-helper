name: "Run Unit Tests"
description: "Run pytest with coverage and publish results"

inputs:
  os:
    description: "OS label for artifact naming"
    required: true
  arch:
    description: "Architecture label for artifact naming"
    required: true
  python-version:
    description: "Python version label for artifact naming"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: uv sync

    - name: Run PyTest
      shell: bash
      run: uv run pytest

    - name: Publish PyTest JUnit Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure()
      continue-on-error: true
      with:
        report_paths: "**/pytest.junit.xml"
        include_passed: true
        update_check: true
        check_name: PyTest - ${{ inputs.os }} ${{ inputs.arch }} Python ${{ inputs.python-version }}

    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      if: runner.os == 'Linux' && inputs.python-version == '3.12' && inputs.arch == 'x86_64'
      continue-on-error: true
      with:
        filename: "test-results/pytest.coverage.xml"
        badge: true
        format: markdown
        fail_below_min: false
        hide_branch_rate: false
        hide_complexity: false
        indicators: true
        output: both
        thresholds: "50 75"

    - name: Upload test results
      if: success() || failure()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ inputs.os }}-${{ inputs.arch }}-py${{ inputs.python-version }}
        path: test-results/
        if-no-files-found: warn
