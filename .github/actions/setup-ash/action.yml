name: "Setup ASH"
description: "Install uv, Python, and optionally install ASH via pip. Checkout must happen before calling this action."

inputs:
  python-version:
    description: "Python version to install"
    required: true
  install-ash:
    description: "Whether to install ASH via pip after setup"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install ASH package (Unix)
      if: inputs.install-ash == 'true' && runner.os != 'Windows'
      shell: bash
      run: pip install .

    - name: Install ASH package (Windows)
      if: inputs.install-ash == 'true' && runner.os == 'Windows'
      shell: pwsh
      run: |
        pip install .
        echo "$env:APPDATA\Python\Scripts" >> $env:GITHUB_PATH
