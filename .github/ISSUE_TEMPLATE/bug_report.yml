name: Bug Report
description: Report a bug in ASH
labels: ["bug"]
body:
  - type: dropdown
    id: version
    attributes:
      label: ASH Version
      description: Which version of ASH are you using?
      options:
        - v3.4.x
        - v3.3.x
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - uvx
        - pip
        - pipx
        - container
        - homebrew
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `ash ...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output here.
      render: shell
