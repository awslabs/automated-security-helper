name: "Version Bump: Minor"

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-minor:
    name: Bump minor version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Get current version
        id: current-version
        run: |
          VERSION=$(uv run python scripts/version_bump.py current | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        run: |
          if ! uv run python scripts/version_bump.py bump minor; then
            echo "::error::Version bump failed"
            exit 1
          fi

      - name: Get new version
        id: new-version
        run: |
          VERSION=$(uv run python scripts/version_bump.py current | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        env:
          OLD_VERSION: ${{ steps.current-version.outputs.version }}
          NEW_VERSION: ${{ steps.new-version.outputs.version }}
          ACTOR: ${{ github.actor }}
        run: |
          if git diff --quiet; then
            echo "No version changes detected, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit \
            -m "chore: bump version ${OLD_VERSION} -> ${NEW_VERSION}" \
            -m "Triggered-by: @${ACTOR} (minor via workflow_dispatch)"
          git push
