name: ASH - Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump version on merge
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Determine bump type
        id: bump-type
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "type=$DISPATCH_BUMP_TYPE" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Get current version
        id: current-version
        run: |
          VERSION=$(uv run python scripts/version_bump.py current | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        env:
          BUMP_TYPE: ${{ steps.bump-type.outputs.type }}
        run: uv run python scripts/version_bump.py bump "$BUMP_TYPE"

      - name: Get new version
        id: new-version
        run: |
          VERSION=$(uv run python scripts/version_bump.py current | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        env:
          OLD_VERSION: ${{ steps.current-version.outputs.version }}
          NEW_VERSION: ${{ steps.new-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version $OLD_VERSION → $NEW_VERSION"
          git push
