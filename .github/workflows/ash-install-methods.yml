name: Install Method Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "hatch_build.py"
      - "automated_security_helper/**"
      - ".pre-commit-hooks.yaml"
      - "Formula/**"
      - ".github/workflows/ash-install-methods.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-install:
    name: pip install (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install via pip
        run: pip install .
      - name: Verify installation
        run: |
          ash --version
          ash --help

  pipx-install:
    name: pipx install (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pipx
        run: pip install pipx
      - name: Install via pipx
        run: pipx install .
      - name: Verify installation
        run: |
          ash --version
          ash --help

  uvx-install:
    name: uvx install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv (Unix)
        if: runner.os != 'Windows'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: pwsh
      - name: Install via uvx
        run: uvx --from . ash --version
        shell: bash

  homebrew-formula:
    name: Homebrew formula (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Validate formula syntax
        run: ruby -c Formula/ash.rb

  pre-commit-hook:
    name: pre-commit hook (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Validate hooks manifest
        run: pre-commit validate-manifest .pre-commit-hooks.yaml

  container-podman:
    name: Container Podman (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Podman (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install podman
          podman machine init
          podman machine start
        continue-on-error: true
      - name: Install ASH
        run: pip install .
      - name: Verify Podman available
        run: podman --version
      - name: Build container with Podman
        run: ash image build --oci-runner podman --force 2>&1 | tail -10
        continue-on-error: true

  container-finch:
    name: Container Finch (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Finch (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask finch
      - name: Install Finch (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -LO https://github.com/runfinch/finch/releases/latest/download/finch-linux-amd64.tar.gz
          sudo tar -xzf finch-linux-amd64.tar.gz -C /usr/local
          rm finch-linux-amd64.tar.gz
        continue-on-error: true
      - name: Initialize Finch VM
        run: finch vm init
        continue-on-error: true
      - name: Start Finch VM
        run: finch vm start
        continue-on-error: true
      - name: Install ASH
        run: pip install .
      - name: Build container with Finch
        run: ash image build --oci-runner finch --force 2>&1 | tail -10
        continue-on-error: true

  mcp-server:
    name: MCP server (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ASH
        run: pip install .
      - name: Verify MCP command
        run: ash mcp --help
      - name: Test MCP server import
        run: python -c "from automated_security_helper.cli.mcp_server import run_mcp_server; print('OK')"
