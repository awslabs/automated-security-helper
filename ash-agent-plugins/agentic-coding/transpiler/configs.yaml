# Per-platform layout descriptions for the agentic-coding transpiler.
# Validated by transpiler/schema.py at load time — typos fail loudly.
#
# Path templates use Python str.format placeholders:
#   {plugin_name}, {skill_name}, {command_name}, {agent_name}, {ref_name}
# The transpiler interpolates them at render time.
#
# Each top-level key is a platform name. Sections inside (plugin_manifest,
# mcp, skill, commands, agents, instruction_file, rules_dir, custom_modes,
# config_file, marketplace, extension_manifest) are all optional — omit any
# section a platform doesn't need.

claude:
  output_dir: claude
  plugin_manifest:
    format: claude
    path: .claude-plugin/plugin.json
  mcp:
    format: mcpServers
    path: .mcp.json
  skill:
    path: skills/{skill_name}/SKILL.md
    frontmatter_fields: [name, description, version]
    include_references: separate_files
    references_path: skills/{skill_name}/references/{ref_name}
  commands:
    path: commands/{command_name}.md
    frontmatter_fields: [description, allowed-tools]
    tools_kind: claude_command
  agents:
    path: agents/{agent_name}.md
    frontmatter_fields: [name, description, model, color, tools]
    tools_kind: claude_agent
  instruction_file:
    path: CLAUDE.md
    template: claude/CLAUDE.md.j2
    include_skill_body: false
    include_references: none

codex:
  output_dir: codex
  plugin_manifest:
    format: codex
    path: .codex-plugin/plugin.json
  mcp:
    format: mcpServers
    path: .mcp.json
  skill:
    path: skills/{skill_name}/SKILL.md
    frontmatter_fields: [name, description, version]
    include_references: separate_files
    references_path: skills/{skill_name}/references/{ref_name}
  marketplace:
    path: marketplace.json

kiro:
  output_dir: kiro
  mcp:
    format: mcpServers
    path: mcp.json
  instruction_file:
    path: POWER.md
    template: kiro/POWER_frontmatter.j2
    include_skill_body: true
    include_references: appended

copilot:
  output_dir: copilot
  mcp:
    format: servers
    path: .vscode/mcp.json
  instruction_file:
    path: .github/copilot-instructions.md
    template: copilot/copilot-instructions.md.j2
    include_skill_body: true
    include_references: none
    truncate_chars: 4000
    truncation_footer: "[... see prompt files for details]"
  commands:
    path: .github/prompts/{command_name}.prompt.md
    frontmatter_fields: [description, name, agent]
    tools_kind: none
    single_quote_strings: true
  agents:
    path: .github/agents/{agent_name}.agent.md
    frontmatter_fields: [name, description, target, model]
    tools_kind: none
    single_quote_strings: true

opencode:
  output_dir: opencode
  mcp:
    format: opencode_embedded
    path: opencode.json
  skill:
    path: .opencode/skills/{skill_name}/SKILL.md
    frontmatter_fields: [name, description]
    include_references: separate_files
    references_path: .opencode/skills/{skill_name}/references/{ref_name}
  commands:
    path: .opencode/commands/{command_name}.md
    frontmatter_fields: [description]
    tools_kind: none
  agents:
    path: .opencode/agents/{agent_name}.md
    frontmatter_fields: [description, mode]
    tools_kind: none

cursor:
  output_dir: cursor
  mcp:
    format: mcpServers
    path: .cursor/mcp.json
  skill:
    path: .cursor/rules/{skill_name}.mdc
    frontmatter_fields: [description, alwaysApply]
    include_references: none
  instruction_file:
    path: AGENTS.md
    template: cursor/AGENTS.md.j2
    include_skill_body: false
    include_references: none

windsurf:
  output_dir: windsurf
  mcp:
    format: mcpServers
    path: null            # null path = MCP shipped via install.sh, not committed
    install_script: windsurf
  skill:
    path: .windsurf/rules/{skill_name}.md
    frontmatter_fields: [trigger, description]
    include_references: none
    truncate_bytes: 12000
    truncation_footer: "[... see project AGENTS.md for full reference]"
  instruction_file:
    path: AGENTS.md
    template: cursor/AGENTS.md.j2
    include_skill_body: false
    include_references: none

cline:
  output_dir: cline
  mcp:
    format: mcpServers
    path: null
    install_script: cline
  rules_dir:
    path: .clinerules
    include_skill_body: true
    include_references: separate_files
    skill_filename: 01-skill.md
    reference_filename_prefix: "02-"
  instruction_file:
    path: AGENTS.md
    template: cursor/AGENTS.md.j2
    include_skill_body: false
    include_references: none

roo:
  output_dir: roo
  mcp:
    format: mcpServers
    path: .roo/mcp.json
  rules_dir:
    path: .roo/rules-{plugin_name}
    include_skill_body: true
    include_references: separate_files
    skill_filename: 01-skill.md
    reference_filename_prefix: "02-"
  custom_modes:
    path: .roomodes
    template: roo/roomodes.j2
  instruction_file:
    path: AGENTS.md
    template: cursor/AGENTS.md.j2
    include_skill_body: false
    include_references: none

continue:
  output_dir: continue
  mcp:
    format: continue_yaml
    path: .continue/mcpServers/{plugin_name}.yaml
    template: continue/mcp_servers.yaml.j2
  skill:
    path: .continue/rules/{skill_name}.md
    frontmatter_fields: [name, description]
    include_references: none

gemini:
  output_dir: gemini
  mcp:
    format: mcpServers
    path: null
    install_script: gemini
  instruction_file:
    path: GEMINI.md
    template: gemini/GEMINI.md.j2
    include_skill_body: true
    include_references: appended
  extension_manifest:
    format: gemini
    path: gemini-extension.json

goose:
  output_dir: goose
  mcp:
    format: goose_yaml
    path: extension.yaml
    template: goose/extension.yaml.j2
    install_script: goose
  instruction_file:
    path: .goosehints
    template: goose/goosehints.j2
    include_skill_body: true
    include_references: appended

amazonq:
  output_dir: amazonq
  mcp:
    format: amazonq
    path: agent.json
    install_script: amazonq

aider:
  output_dir: aider
  instruction_file:
    path: CONVENTIONS.md
    template: aider/CONVENTIONS.md.j2
    include_skill_body: true
    include_references: appended
  config_file:
    path: .aider.conf.yml
    template: aider/aider_conf.yml.j2

# Anthropic MCPB / Desktop Extensions — produces a .mcpb ZIP archive for
# one-click install in Claude Desktop. The archive bundles a manifest.json
# whose `mcp_config` invokes uvx to fetch ASH at runtime — no server source
# needs to be bundled because uvx handles distribution.
mcpb:
  output_dir: mcpb
  mcpb_bundle:
    archive_path: ash.mcpb
    manifest_version: "0.3"
    server_type: binary
    long_description: |
      Run ASH (Automated Security Helper) security scans directly in Claude
      Desktop. Bundles uvx-based ASH MCP server invocation; no separate
      install step required beyond having uvx on the user's PATH.
