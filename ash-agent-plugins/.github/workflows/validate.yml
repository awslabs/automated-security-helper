name: Validate plugin packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Node.js (for npm-installed CLIs)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install platform CLIs at pinned major.minor versions matching
      # transpiler/_base/cli_versions.json. Each CLI's smoke_test() asserts
      # `<cli> --version` reports the same major.minor before invoking the
      # validator, so a CI image with a drift-from-pin install hard-fails
      # at the assertion rather than silently running against an
      # unsupported CLI version.
      - name: Install platform CLIs (pinned)
        run: |
          npm install -g @anthropic-ai/claude-code@2.1
          npm install -g @openai/codex@0.130
          npm install -g @google/gemini-cli@0.41
          npm install -g @anthropic-ai/mcpb@2.1
          npm install -g opencode-ai@1.14
          # Aider via pipx (Python).
          pipx install aider-chat==0.86.2
          # Goose via release tarball — no npm package.
          curl -fsSL https://github.com/aaif-goose/goose/releases/download/v1.33.1/download_cli.sh | CONFIGURE=false bash || true
          # kiro-cli via release zip.
          curl --proto '=https' --tlsv1.2 -sSf 'https://desktop-release.q.us-east-1.amazonaws.com/latest/kirocli-x86_64-linux.zip' -o /tmp/kirocli.zip
          unzip -q /tmp/kirocli.zip -d /tmp/
          /tmp/kirocli/install.sh </dev/null || true

      - name: Verify drift + validation
        run: uv run --project agentic-coding/transpiler agentic-plugins check

      - name: Run pytest regression suite
        run: uv run --project agentic-coding/transpiler --extra test pytest agentic-coding/transpiler/tests/

      - name: Smoke-test that platform CLIs load each plugin
        run: uv run --project agentic-coding/transpiler agentic-plugins smoke-test
